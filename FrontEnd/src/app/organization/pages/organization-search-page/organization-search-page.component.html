<div class="page-header">
  <h1>Organization Definition</h1>
  <button mat-flat-button color="accent" routerLink="/organizations/add">
    Add New Organization
  </button>
</div>
<h2>Organization Inquiry</h2>
<form [formGroup]="searchForm" class="search-filters">
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Organization Name</mat-label>
    <input matInput formControlName="name" />
  </mat-form-field>
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Organization Code</mat-label>
    <input matInput formControlName="code" />
  </mat-form-field>
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Country</mat-label>
    <input
      matInput
      formControlName="country"
      [matAutocomplete]="countryAuto"
    />
    <mat-autocomplete #countryAuto="matAutocomplete">
      <mat-option *ngFor="let opt of filteredCountryOptions$ | async" [value]="opt">
        {{ opt }}
      </mat-option>
    </mat-autocomplete>
  </mat-form-field>
  <button mat-flat-button color="primary" type="button" (click)="search()">
    Search
  </button>
</form>
<h2>Organization List</h2>
<app-reusable-table
  [columns]="tableColumns"
  [actions]="tableActions"
  [data]="results"
  [loading]="loading"
></app-reusable-table>
